<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="fubuki.png">
<link rel="apple-touch-icon" href="fubuki.png">
<title>ひとことフブキ</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #f5fbff;
  font-family: "Segoe UI", sans-serif;
}

/* メニュー */
.menu {
  position: fixed;
  top: 20px;
  left: 20px;
  z-index: 10;
}

.menu button {
  padding: 8px 14px;
  border: 1px solid #7fbce0;
  background: rgba(255,255,255,0.8);
  border-radius: 8px;
  cursor: pointer;
  transition: 0.2s;
}
.menu button:hover {
  background: #dff4ff;
}

/* 図鑑 */
.log {
  display: none;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.9);

  width: 300px;
  max-height: 400px;
  overflow-y: auto;

  border-radius: 12px;
  border: 1px solid #7fbce0;
  background: rgba(255,255,255,0.88);
  padding: 15px;
  font-size: 12px;

  box-shadow: 0 10px 30px rgba(0,0,0,0.2);

  opacity: 0;
  transition: 0.2s;

  z-index: 100;
}

.log {
  transform: translate(-50%, -50%) scale(0.6);
}

.log.show {
  display: block;
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
  animation: popup 0.25s ease;
}

@keyframes popup {
  0% {
    transform: translate(-50%, -50%) scale(0.3);
    opacity: 0;
  }
  60% {
    transform: translate(-50%, -50%) scale(1.05);
    opacity: 1;
  }
  100% {
    transform: translate(-50%, -50%) scale(1);
  }
}

/* メイン */
.container {
  position: relative;
  width: 320px;
  padding: 15px;
  border-radius: 16px;
  border: 1px solid #7fbce0;
  text-align: center;

  background: linear-gradient(120deg, #e6f7ff, #cfeeff, #f0fbff);
  background-size: 200% 200%;
  animation: glow 10s ease infinite;

  box-shadow: 0 8px 20px rgba(0,0,0,0.08);
}

@keyframes glow {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.title {
  font-size: 18px;
  font-weight: bold;
  color: #2a6fff;
  margin-bottom: 8px;
  letter-spacing: 1px;

  text-shadow: 0 0 6px rgba(80,150,255,0.3);
}
  
.character {
  width: 260px;
  filter: drop-shadow(0 4px 6px rgba(0,0,0,0.15));
}

/* 吹き出し */
.speech {
  position: absolute;
  bottom: -35px;
  left: 50%;
  transform: translateX(-50%);
  width: 280px;
  padding: 12px;

  border-radius: 12px;
  border: 1px solid #7fbce0;
  background: rgba(255,255,255,0.95);

  font-size: 14px;
  text-align: left;
  min-height: 45px;

  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.speech::after {
  content: "▼";
  position: absolute;
  right: 10px;
  bottom: 5px;
  font-size: 12px;
  color: #7fbce0;
}

.blur {
  filter: blur(5px);
}

/* 暗くなる、ぼける */
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  background: rgba(0,0,0,0.25);
  backdrop-filter: blur(6px);

  opacity: 0;
  pointer-events: none;
  transition: 0.2s;

  z-index: 50;
  
  display: none;
}

.overlay.show {
  opacity: 1;
  pointer-events: auto;
}

.closeBtn {
  position: absolute;
  top: 8px;
  right: 10px;

  background: none;
  border: none;
  font-size: 18px;
  color: #7fbce0;
  cursor: pointer;

  transition: 0.2s;
}

.closeBtn:hover {
  color: #2a6fff;
  transform: scale(1.2);
}

/* デバッグ用UI */
.debug-toggle-container {
  position: fixed;
  bottom: 20px;
  right: 20px;
  display: flex;
  align-items: center;
  gap: 8px;
  z-index: 10;
  font-size: 12px;
  color: #7fbce0;
}

.switch {
  position: relative;
  display: inline-block;
  width: 40px;
  height: 20px;
}

.switch input {
  opacity: 0;
  width: 0;
  height: 0;
}

.slider {
  position: absolute;
  cursor: pointer;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background-color: #ccc;
  transition: .4s;
  border-radius: 20px;
}

.slider:before {
  position: absolute;
  content: "";
  height: 14px;
  width: 14px;
  left: 3px;
  bottom: 3px;
  background-color: white;
  transition: .4s;
  border-radius: 50%;
}

input:checked + .slider {
  background-color: #2a6fff;
}

input:checked + .slider:before {
  transform: translateX(20px);
}

.debug-menu {
  position: fixed;
  bottom: 50px;
  right: 20px;
  background: rgba(255, 255, 255, 0.9);
  border: 1px solid #7fbce0;
  border-radius: 8px;
  padding: 10px;
  display: flex;
  flex-direction: column;
  z-index: 10;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.debug-menu select {
  padding: 4px;
  border: 1px solid #7fbce0;
  border-radius: 4px;
  color: #333;
}

.debug-menu button {
  padding: 4px 8px;
  border: 1px solid #ff7b7b;
  background: #fff0f0;
  color: #d93030;
  border-radius: 4px;
  cursor: pointer;
  font-size: 12px;
}
.debug-menu button:hover {
  background: #ffd6d6;
}
</style>
</head>

<body>

<div id="overlay" class="overlay"></div>

<div class="menu">
  <button onclick="toggleLog()">セリフ一覧</button>
</div>

<div class="debug-toggle-container">
  <span>デバッグモード</span>
  <label class="switch">
    <input type="checkbox" id="debugToggle" onchange="handleDebugToggle(this)">
    <span class="slider"></span>
  </label>
</div>

<div class="debug-menu" id="debugMenu" style="display: none;">
  <label style="font-size: 12px; color: #2a6fff;">セリフ指定:</label>
  <select id="debugCondition">
    <option value="all">全ランダム</option>
    <option value="morning">朝</option>
    <option value="noon1">昼1</option>
    <option value="noon2">昼2</option>
    <option value="evening">夕方</option>
    <option value="night">夜</option>
    <option value="midnight">深夜</option>
    <option value="seasonal">季節</option>
    <option value="rare_normal">レア(通常)</option>
    <option value="rare_midnight">レア(深夜)</option>
  </select>
  <button onclick="resetNormalHistory()" style="margin-top: 8px;">通常履歴リセット</button>
</div>

<div id="log" class="log">
  <button class="closeBtn" onclick="toggleLog()">×</button>
  <div id="logContent"></div>
</div>

<div id="passwordModal" class="log">
  <button class="closeBtn" onclick="closePasswordModal()">×</button>
  <div style="text-align: center; margin-top: 20px;">
    パスワードを入力してください<br>
    <input type="password" id="debugPassword" style="margin: 15px 0; padding: 5px; width: 80%; border: 1px solid #7fbce0; border-radius: 4px;"><br>
    <button onclick="checkPassword()" style="padding: 5px 15px; border: 1px solid #7fbce0; background: #e6f7ff; border-radius: 4px; cursor: pointer;">認証</button>
  </div>
</div>

<div class="container" onclick="speak()">
  <div class="title">ひとことフブキ</div>
  <img id="img" src="fubuki.png" class="character">
  <div id="speech" class="speech">（クリックしてね）</div>
</div>

<script>
// ===== セリフ =====
const normalLines = [
"今日は静かね",
"市場のほうが盛り上がってるようね。ちょっと見に行ってみようかしら",
"この仕事が終わったらお茶にしましょうか",
"そういえばあの書類、そろそろ取りかからないと",
"甘いもの食べたい…",
"ツゲ、どこ行ってたの？"
];

const timeLines = {
morning: [
"おはよう、今日もいい朝ね",
"太陽の光を浴びると目が覚めるらしいわね　　…ここは日光が届かないけど…",
"忘れ物はない？",
"遅刻しないようにね",
"ツゲ起きて、朝ごはんよ"
],
noon1: [
"さて、今日も仕事しますか",
"坑道の見回りに行ってこようかな",
"ちょっとお腹が空いてきたわね…",
"今日片づける仕事はこれとあれと……",
"書類、誰か代わりに読んでくれないかしら"
],
noon2: [
"ちょっと眠いわね…",
"今日のおやつは何にしようかしら",
"午後もわりと仕事あるわね…",
"ツゲぴょん、これ手伝って～…　痛い痛い！ごめんって！",
"(ペンを持つと絵が描きたくなる…)"
],
evening: [
"今日の夜ご飯は何にしようかしら",
"これ、今日中に終わるのかな…",
"不意に屋台の食べ物が食べたくなってきたわ",
"そろそろ坑道を見に行かないと",
"(夜ご飯、ルイベじゃないといいな…)"
],
night: [
"今日も一日、お疲れ様",
"夜ご飯おいしかったわ、どこの具材使ってたんだろう",
"食後のデザートってずっと食べたくなるわよね",
"私はそろそろ寝るわ。おやすみなさい",
"(明日はあれやらないと…)"
],
midnight: [
"すやすや…(日常の夢を見ているようだ)",
"むにゃ…(仕事の夢を見ているようだ)",
"………(ぐっすり眠っているようだ)",
"…こんな時間に何をしてるの？",
"早く寝なさい、身体に障るわよ"
]
};

const rareLines = {
normal: [
"炎の魔力と轟音……　またやったわねマッヒー…",
"もう少し暇だったらバネッサまで遊びに行くんだけど",
"…みんな何してるかなぁ",
"カップラーメン食べたいなぁ",
"護王様ってあの身体でどうやって仕事してるんだろ"
],
midnight: [
"ふふふ……(いつかの旅の夢を見ているようだ)",
"うぐ…うーん……(いつかの戦いの夢を見ているようだ)",
"ぼくらだけの…せかい……(いつかの居場所の夢を見ているようだ)",
"たんい…ほしい……(いつかの学び舎の夢を見ているようだ)",
"まだ起きてるの？　…仕方ないわね、ちょっと弾いてあげるから早く寝なさいよ。何がいい？"
]
};

const eventLines = {
"1-1": ["あけましておめでとう。今年も良い一年にしましょうね"],
"1-12": ["今日って確か3号さんの誕生日だよね？　…祝う手段はないけれど…"],
"4-1": ["今日から私、ニライカナイに引っ越すことにしたの。　…当然嘘よ"],
"5-17": ["今日は誕生日ね、ケーキでも食べようかしら。　…いや、この世界での誕生日は知らないけど…"],
"8-5": ["…今日はあの場所の……何周年なんだ…？"],
"10-31": ["トリックオアトリート！　冗談よ、お菓子いる？"],
"12-25": ["今日はクリスマス、プレゼントには時間がほしいわ。　…前の人生でもそんなこと言ってたような…"],
"12-31": ["今日は大晦日ね、充実した一年だった？　来年もよろしくね"]
};

const achievementLines = [];
  
const achievements = {
  morning: {
    lines: [...timeLines.morning],
    reward: "ふわぁ……まだ少し眠いわね",
    unlocked: false
  },
  noon1: {
    lines: [...timeLines.noon1],
    reward: "私と喋ってないで、やることやりなさいよ",
    unlocked: false
  },
  noon2: {
    lines: [...timeLines.noon2],
    reward: "そろそろおやつにしましょうか。あなたも食べる？",
    unlocked: false
  },
  evening: {
    lines: [...timeLines.evening],
    reward: "いい匂い…　これはカンボジアブロッコリー…？",
    unlocked: false
  },
  night: {
    lines: [...timeLines.night],
    reward: "21時就寝は早い？千年前の私に言ってちょうだい",
    unlocked: false
  },
  late: {
    lines: [...timeLines.midnight],
    reward: "すー…すー…(おいしいごはんの夢を見ているようだ)",
    unlocked: false
  },
  rare: {
    lines: [...rareLines.normal],
    reward: "もっと私のことを知りたい？　…もう十分知ってるわよ",
    unlocked: false
  },
  seasonal: {
    lines: [...Object.values(eventLines).flat()],
    reward: "そういえば、あなたの誕生日っていつなの？",
    unlocked: false
  }
};

const allDialogueLines = [
  ...normalLines,
  ...timeLines.morning,
  ...timeLines.noon1,
  ...timeLines.noon2,
  ...timeLines.evening,
  ...timeLines.night,
  ...timeLines.midnight,
  ...Object.values(eventLines).flat(),
  ...rareLines.normal,
  ...rareLines.midnight,
  ...achievementLines
];

achievements.all = {
  lines: allDialogueLines,
  reward: "いらっしゃい、今日はどうしたの？",
  unlocked: false
};

// ===== ロジック・状態管理 =====
let typing = false;
let pendingRewards = [];
let isDebugMode = false;
let debugSeen = [];
const debugPassword = "fubuki_214_kisaragi"; // デバッグ用パスワード

function addRewardToPool(key, reward) {
  if (timeLines[key] && !timeLines[key].includes(reward)) {
    timeLines[key].push(reward);
  } else if (key === 'late' && !timeLines.midnight.includes(reward)) {
    timeLines.midnight.push(reward);
  } else {
    if (!normalLines.includes(reward)) {
      normalLines.push(reward);
    }
  }
}

function initializeAchievements(targetSeen) {
  achievementLines.length = 0;
  for (let key in achievements) {
    achievements[key].unlocked = false;
  }

  for (let key in achievements) {
    const ach = achievements[key];
    const allSeen = ach.lines.every(line => targetSeen.includes(line));

    if (allSeen) {
      ach.unlocked = true;
      if (!achievementLines.includes(ach.reward)) {
        achievementLines.push(ach.reward);
      }
      addRewardToPool(key, ach.reward);
    }
  }
}

let seen = JSON.parse(localStorage.getItem("seen") || "[]");
initializeAchievements(seen);

// デバッグ機能
function handleDebugToggle(checkbox) {
  if (checkbox.checked) {
    checkbox.checked = false; 
    document.getElementById("overlay").style.display = "block";
    setTimeout(() => document.getElementById("overlay").classList.add("show"), 10);
    const modal = document.getElementById("passwordModal");
    modal.style.display = "block";
    setTimeout(() => modal.classList.add("show"), 10);
  } else {
    isDebugMode = false;
    debugSeen = [];
    document.getElementById("debugMenu").style.display = "none";
    alert("デバッグモードを終了しました。履歴は通常モードに戻ります。");
    initializeAchievements(seen);
  }
}

function closePasswordModal() {
  const modal = document.getElementById("passwordModal");
  modal.classList.remove("show");
  document.getElementById("overlay").classList.remove("show");
  setTimeout(() => {
    modal.style.display = "none";
    document.getElementById("overlay").style.display = "none";
  }, 200);
}

function checkPassword() {
  const input = document.getElementById("debugPassword").value;
  if (input === debugPassword) {
    isDebugMode = true;
    debugSeen = []; 
    initializeAchievements(debugSeen);

    document.getElementById("debugToggle").checked = true;
    document.getElementById("debugPassword").value = "";
    document.getElementById("debugMenu").style.display = "flex";
    closePasswordModal();
    alert("デバッグモードを開始しました。");
  } else {
    alert("パスワードが違います。");
  }
}

function resetNormalHistory() {
  if (confirm("通常モードの履歴を完全に削除します。よろしいですか？")) {
    localStorage.removeItem("seen");
    seen = [];
    if (!isDebugMode) {
      initializeAchievements(seen);
    }
    alert("通常モードの履歴をリセットしました。");
  }
}

function saveSeen(text){
  if (isDebugMode) {
    if(!debugSeen.includes(text)){
      debugSeen.push(text);
    }
  } else {
    if(!seen.includes(text)){
      seen.push(text);
      localStorage.setItem("seen", JSON.stringify(seen));
    }
  }
}

// ===== 図鑑 =====
function toggleLog() {
  const log = document.getElementById("log");
  const overlay = document.getElementById("overlay");

  if (log.classList.contains("show")) {
    log.classList.remove("show");
    overlay.classList.remove("show");
    setTimeout(() => {
      log.style.display = "none";
      overlay.style.display = "none";
    }, 200);
  } else {
    renderLog();
    log.style.display = "block";
    overlay.style.display = "block";
    setTimeout(() => {
      log.classList.add("show");
      overlay.classList.add("show");
    }, 10);
  }
}

function renderLog() {
  const log = document.getElementById("logContent");
  log.innerHTML = "";
  const currentSeen = isDebugMode ? debugSeen : seen;

  const allRewards = [];
  for (let key in achievements) {
    allRewards.push(achievements[key].reward);
  }

  const sections = [
    ["通常", normalLines],
    ["朝", timeLines.morning],
    ["昼1", timeLines.noon1],
    ["昼2", timeLines.noon2],
    ["夕方", timeLines.evening],
    ["夜", timeLines.night],
    ["深夜", timeLines.midnight],
    ["季節", Object.values(eventLines).flat()],
    ["レア", [...rareLines.normal, ...rareLines.midnight]],
    ["アチーブメント", achievementLines]
  ];

  sections.forEach(([name, arr]) => {
    log.innerHTML += `<b>${name}</b><br>`;
    arr.forEach(text => {
      if (name !== "アチーブメント" && allRewards.includes(text)) {
        return; 
      }
      log.innerHTML += currentSeen.includes(text) ? text : "？？？";
      log.innerHTML += "<br>";
    });
    log.innerHTML += "<br>";
  });
}

// ===== キャラクターの処理 =====
function getZone(hour){
  if(hour>=5 && hour<9) return "morning";
  if(hour<12) return "noon1";
  if(hour<16) return "noon2";
  if(hour<18) return "evening";
  if(hour<21) return "night";
  return "midnight";
}

function pick(arr){
  return arr[Math.floor(Math.random()*arr.length)];
}

function speak(){
  if (pendingRewards.length > 0) {
    const rewardLine = pendingRewards.shift();
    showLine(rewardLine, true);
    return;
  }

  let line;
  let isRare = false;

  if (isDebugMode) {
    const condition = document.getElementById("debugCondition").value;
    let pool = [];

    switch (condition) {
      case "all":
        pool = [
          ...normalLines,
          ...Object.values(timeLines).flat(),
          ...Object.values(eventLines).flat(),
          ...rareLines.normal,
          ...rareLines.midnight
        ];
        line = pick(pool);
        isRare = rareLines.normal.includes(line) || rareLines.midnight.includes(line);
        break;
      case "morning":
      case "noon1":
      case "noon2":
      case "evening":
      case "night":
      case "midnight":
        pool = timeLines[condition];
        line = pick(pool);
        break;
      case "seasonal":
        pool = Object.values(eventLines).flat();
        line = pick(pool);
        break;
      case "rare_normal":
        pool = rareLines.normal;
        line = pick(pool);
        isRare = true;
        break;
      case "rare_midnight":
        pool = rareLines.midnight;
        line = pick(pool);
        isRare = true;
        break;
    }
    showLine(line, isRare);
    return;
  }

  const now = new Date();
  const hour = now.getHours();
  const zone = getZone(hour);
  const key = (now.getMonth()+1)+"-"+now.getDate();

  if(eventLines[key] && Math.random()<0.3){
    line = pick(eventLines[key]);
    showLine(line, false);
    return;
  }

  if(Math.random()<0.01){
    line = (zone==="midnight") ? pick(rareLines.midnight) : pick(rareLines.normal);
    isRare = true;
    showLine(line, isRare);
    return;
  }

  if(zone==="midnight"){
    line = pick(timeLines.midnight);
  } else {
    if(Math.random()<0.6){
      line = pick(timeLines[zone]);
    } else {
      line = pick(normalLines);
    }
  }

  showLine(line, isRare);
}

function showLine(text, isRare){
  saveSeen(text);
  const el = document.getElementById("speech");
  el.style.color = isRare ? "#2a6fff" : "black";
  typeText(text);

  if(text.includes("すやすや") || text.includes("むにゃ")){
    document.getElementById("img").src = "fubuki.png";
  } else {
    document.getElementById("img").src = "fubuki.png";
  }
}

function typeText(text) {
  if (typing) return;
  typing = true;

  const el = document.getElementById("speech");
  el.textContent = "";

  let i = 0;
  function step() {
    if (i < text.length) {
      el.textContent += text[i];
      i++;
      setTimeout(step, 25);
    } else {
      typing = false;
      checkAchievements();
    }
  }
  step();
}

function checkAchievements() {
  const currentSeen = isDebugMode ? debugSeen : seen;

  for (let key in achievements) {
    const ach = achievements[key];
    if (ach.unlocked) continue;

    const allSeen = ach.lines.every(line => currentSeen.includes(line));

    if (allSeen) {
      ach.unlocked = true;
      pendingRewards.push("✨ " + ach.reward);

      if (!achievementLines.includes(ach.reward)) {
        achievementLines.push(ach.reward);
      }
      addRewardToPool(key, ach.reward);
    }
  }
}

document.getElementById("overlay").onclick = function(e) {
  if (e.target.id === "overlay") {
    if (document.getElementById("passwordModal").classList.contains("show")) {
      closePasswordModal();
    } else {
      toggleLog();
    }
  }
};
