<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<title>ひとことフブキ</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  overflow-x: hidden;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding-top: 80px; 
  box-sizing: border-box;
  background: #f5fbff;
  font-family: "Segoe UI", sans-serif;
}

.menu, .reminder-menu, .debug-toggle-container, .debug-menu {
  -webkit-transform: translate3d(0, 0, 0);
  transform: translate3d(0, 0, 0);
  -webkit-backface-visibility: hidden;
  backface-visibility: hidden;
}

.menu {
  position: fixed;
  top: 20px;
  left: 20px;
  z-index: 10;
  display: flex;
  gap: 8px;
}

.reminder-menu {
  position: fixed;
  bottom: 20px;
  left: 20px;
  z-index: 10;
}

.menu button, .reminder-menu button {
  padding: 8px 14px;
  border: 1px solid #7fbce0;
  background: rgba(255,255,255,0.8);
  border-radius: 8px;
  cursor: pointer;
  transition: 0.2s;
}
.menu button:hover, .reminder-menu button:hover {
  background: #dff4ff;
}

.log {
  display: none;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.9);

  width: 300px;
  max-height: 400px;
  overflow-y: auto;

  border-radius: 12px;
  border: 1px solid #7fbce0;
  background: rgba(255,255,255,0.88);
  padding: 15px;
  font-size: 12px;

  box-shadow: 0 10px 30px rgba(0,0,0,0.2);

  opacity: 0;
  transition: 0.2s;

  z-index: 100;
}

.log.show {
  display: block;
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
  animation: popup 0.25s ease;
}

@keyframes popup {
  0% { transform: translate(-50%, -50%) scale(0.3); opacity: 0; }
  60% { transform: translate(-50%, -50%) scale(1.05); opacity: 1; }
  100% { transform: translate(-50%, -50%) scale(1); }
}

.app-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 60px;
  transition: 0.3s;
}

.container {
  position: relative;
  width: 320px;
  padding: 15px;
  border-radius: 16px;
  border: 1px solid #7fbce0;
  text-align: center;

  background: linear-gradient(120deg, #e6f7ff, #cfeeff, #f0fbff);
  background-size: 200% 200%;
  animation: glow 10s ease infinite;

  box-shadow: 0 8px 20px rgba(0,0,0,0.08);
}

@keyframes glow {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.title {
  font-size: 18px;
  color: #2a6fff;
  margin-bottom: 8px;
  letter-spacing: 1px;
  text-shadow: 0 0 6px rgba(80,150,255,0.3);
}
  
.character {
  width: 260px;
  filter: drop-shadow(0 4px 6px rgba(0,0,0,0.15));
}

.speech {
  position: absolute;
  bottom: -35px;
  left: 50%;
  transform: translateX(-50%);
  width: 280px;
  padding: 12px;

  border-radius: 12px;
  border: 1px solid #7fbce0;
  background: rgba(255,255,255,0.95);

  font-size: 14px;
  text-align: left;
  min-height: 45px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.speech::after {
  content: "▼";
  position: absolute;
  right: 10px;
  bottom: 5px;
  font-size: 12px;
  color: #7fbce0;
}

.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  background: rgba(0,0,0,0.25);
  backdrop-filter: blur(6px);

  opacity: 0;
  pointer-events: none;
  transition: 0.2s;
  z-index: 50;
  display: none;
}

.overlay.show {
  opacity: 1;
  pointer-events: auto;
}

.closeBtn {
  position: absolute;
  top: 8px;
  right: 10px;
  background: none;
  border: none;
  font-size: 18px;
  color: #7fbce0;
  cursor: pointer;
  transition: 0.2s;
}

.closeBtn:hover {
  color: #2a6fff;
  transform: scale(1.2);
}

.debug-toggle-container {
  position: fixed;
  bottom: 20px;
  right: 20px;
  display: flex;
  align-items: center;
  gap: 8px;
  z-index: 10;
  font-size: 12px;
  color: #7fbce0;
}

.switch {
  position: relative;
  display: inline-block;
  width: 40px;
  height: 20px;
}

.switch input { opacity: 0; width: 0; height: 0; }
.slider {
  position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
  background-color: #ccc; transition: .4s; border-radius: 20px;
}
.slider:before {
  position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px;
  background-color: white; transition: .4s; border-radius: 50%;
}
input:checked + .slider { background-color: #2a6fff; }
input:checked + .slider:before { transform: translateX(20px); }

.debug-menu {
  position: fixed; bottom: 50px; right: 20px;
  background: rgba(255, 255, 255, 0.9); border: 1px solid #7fbce0;
  border-radius: 8px; padding: 10px; display: flex; flex-direction: column;
  z-index: 10; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}
.debug-menu select { padding: 4px; border: 1px solid #7fbce0; border-radius: 4px; color: #333; }
.debug-menu button {
  padding: 4px 8px; border: 1px solid #ff7b7b; background: #fff0f0;
  color: #d93030; border-radius: 4px; cursor: pointer; font-size: 12px;
}
.debug-menu button:hover { background: #ffd6d6; }

.bd-select { padding: 4px; border: 1px solid #7fbce0; border-radius: 4px; font-size: 14px; }

.reminder-display {
  width: 320px;
  padding: 12px 16px;
  box-sizing: border-box;
  border-radius: 12px;
  background: rgba(255, 255, 255, 0.95);
  border: 1px solid #ffb3c6;
  border-left: 6px solid #ff7b7b;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  text-align: left;
  position: relative;
  touch-action: none;
  user-select: none;
  cursor: grab;
}

.reminder-display:active { cursor: grabbing; }

.rem-long-pressed {
  background: #fff0f0;
  border-color: #ff7b7b;
}

.rem-title { font-size: 15px; color: #d93030; margin-bottom: 4px; }
.rem-time { font-size: 12px; color: #666; }
.rem-count { position: absolute; top: 12px; right: 16px; font-size: 12px; color: #ff7b7b; }
.rem-hint { font-size: 10px; color: #aaa; margin-top: 8px; text-align: right; }

.rem-input {
  padding: 8px;
  border: 1px solid #7fbce0;
  border-radius: 4px;
  font-size: 14px;
  width: 80%;
  box-sizing: border-box;
}

</style>
</head>

<div id="log" class="log">

function addRewardToPool(key, reward) {
  if (timeLines[key] && !timeLines[key].includes(reward)) {
    timeLines[key].push(reward);
  } else if (key === 'late' && !timeLines.midnight.includes(reward)) {
    timeLines.midnight.push(reward);
  } else {
    if (!normalLines.includes(reward)) normalLines.push(reward);
  }
}

function removeAllRewardsFromPools() {
  const allRewards = [];
  for (let k in achievements) allRewards.push(achievements[k].reward);
  for (let i = normalLines.length - 1; i >= 0; i--) {
    if (allRewards.includes(normalLines[i])) normalLines.splice(i, 1);
  }
  for (let tKey in timeLines) {
    for (let i = timeLines[tKey].length - 1; i >= 0; i--) {
      if (allRewards.includes(timeLines[tKey][i])) timeLines[tKey].splice(i, 1);
    }
  }
}

function initializeAchievements(targetSeen) {
  removeAllRewardsFromPools();
  achievementLines.length = 0;
  
  if (userBirthday) {
    if (!eventLines[userBirthday]) eventLines[userBirthday] = [];
    if (!eventLines[userBirthday].includes(playerBirthdayLine)) {
      eventLines[userBirthday].push(playerBirthdayLine);
    }
  }

  const allDialogueLines = [
    ...normalLines,
    ...timeLines.morning, ...timeLines.noon1, ...timeLines.noon2,
    ...timeLines.evening, ...timeLines.night, ...timeLines.midnight,
    ...Object.values(eventLines).flat(),
    ...rareLines.normal, ...rareLines.midnight
  ];
  achievements.all.lines = allDialogueLines;

  for (let key in achievements) achievements[key].unlocked = false;

  for (let key in achievements) {
    const ach = achievements[key];
    const allSeen = ach.lines.every(line => targetSeen.includes(line));

    if (allSeen) {
      ach.unlocked = true;
      if (!achievementLines.includes(ach.reward)) achievementLines.push(ach.reward);
      addRewardToPool(key, ach.reward);
    }
  }

  if (achievements.seasonal.unlocked) {
    document.getElementById("editBirthdayBtn").style.display = "inline-block";
  } else {
    document.getElementById("editBirthdayBtn").style.display = "none";
  }
}

let seen = JSON.parse(localStorage.getItem("seen") || "[]");
initializeAchievements(seen);

// ===== リマインダー機能 =====
function saveReminders() {
  localStorage.setItem("reminders", JSON.stringify(allReminders));
}

function openReminderCreateModal() {
  const modal = document.getElementById("reminderCreateModal");
  document.getElementById("overlay").style.display = "block";
  modal.style.display = "block";
  
  const now = new Date();
  const todayDate = `${now.getFullYear()}-${(now.getMonth()+1).toString().padStart(2,'0')}-${now.getDate().toString().padStart(2,'0')}`;
  document.getElementById("remDateInput").value = todayDate;
  
  setTimeout(() => {
    document.getElementById("overlay").classList.add("show");
    modal.classList.add("show");
  }, 10);
}

function closeReminderCreateModal() {
  const modal = document.getElementById("reminderCreateModal");
  modal.classList.remove("show");
  document.getElementById("overlay").classList.remove("show");
  setTimeout(() => {
    modal.style.display = "none";
    document.getElementById("overlay").style.display = "none";
  }, 200);
}

function saveNewReminder() {
  const title = document.getElementById("remTitleInput").value;
  const date = document.getElementById("remDateInput").value;
  const time = document.getElementById("remTimeInput").value;

  if (!title || !date || !time) {
    alert("タイトル、日付、時間をすべて入力してください。");
    return;
  }

  const dateTimeStr = `${date}T${time}`;
  allReminders.push({
    id: Date.now(),
    title: title,
    time: dateTimeStr,
    isDismissed: false
  });
  saveReminders();

  document.getElementById("remTitleInput").value = "";
  closeReminderCreateModal();
  checkActiveReminders();
}

function checkActiveReminders() {
  const now = new Date();
  activeReminders = allReminders
    .filter(r => !r.isDismissed && new Date(r.time) <= now)
    .sort((a, b) => new Date(a.time) - new Date(b.time))
    .slice(0, 5);

  const display = document.getElementById("reminderDisplay");
  if (activeReminders.length > 0) {
    if (currentRemIndex >= activeReminders.length) currentRemIndex = 0;
    display.style.display = "block";
    updateReminderContent();
  } else {
    display.style.display = "none";
  }
}

function updateReminderContent() {
  if (activeReminders.length === 0) return;
  const r = activeReminders[currentRemIndex];
  const d = new Date(r.time);
  const timeStr = `${d.getFullYear()}/${(d.getMonth()+1)}/${d.getDate()} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;

  document.getElementById("remCountText").textContent = `${currentRemIndex + 1} / ${activeReminders.length}`;
  document.getElementById("remTitleText").textContent = r.title;
  document.getElementById("remTimeText").textContent = timeStr;
}

// スワイプ・長押し操作
let remStartX=0, remStartY=0, remCurX=0, remCurY=0;
let remDragging = false;
let remLongPressTimer = null;
let remLongPressed = false;
const remDisplay = document.getElementById("reminderDisplay");

remDisplay.addEventListener("pointerdown", (e) => {
  remDragging = true;
  remStartX = e.clientX;
  remStartY = e.clientY;
  remLongPressed = false;
  remDisplay.setPointerCapture(e.pointerId);
  remDisplay.style.transition = "none";

  remLongPressTimer = setTimeout(() => {
    if (remDragging) {
      remLongPressed = true;
      remDisplay.classList.add("rem-long-pressed");
      if (navigator.vibrate) navigator.vibrate(50);
    }
  }, 400); 
});

remDisplay.addEventListener("pointermove", (e) => {
  if (!remDragging) return;
  remCurX = e.clientX;
  remCurY = e.clientY;
  let dx = remCurX - remStartX;
  let dy = remCurY - remStartY;

  if (!remLongPressed && (Math.abs(dx) > 10 || Math.abs(dy) > 10)) {
    clearTimeout(remLongPressTimer);
  }

  if (remLongPressed) {
    if (dy > 0) remDisplay.style.transform = `scale(0.95) translateY(${dy}px)`;
  } else {
    remDisplay.style.transform = `translateX(${dx}px)`;
  }
});

remDisplay.addEventListener("pointerup", endRemDrag);
remDisplay.addEventListener("pointercancel", endRemDrag);

function endRemDrag(e) {
  if (!remDragging) return;
  remDragging = false;
  clearTimeout(remLongPressTimer);
  remDisplay.classList.remove("rem-long-pressed");

  let dx = remCurX - remStartX;
  let dy = remCurY - remStartY;
  
  if (remLongPressed) {
    remDisplay.style.transition = "transform 0.3s ease, opacity 0.3s ease";
    if (dy > 50) {
      dismissCurrentReminder();
    } else {
      remDisplay.style.transform = "translate(0px, 0px)";
    }
  } else {
    if (dx > 50) {
      cycleReminder(1);
    } else if (dx < -50) {
      cycleReminder(-1);
    } else {
      remDisplay.style.transition = "transform 0.3s ease";
      remDisplay.style.transform = "translate(0px, 0px)";
    }
  }
}

function cycleReminder(dir) {
  if (activeReminders.length <= 1) {
    remDisplay.style.transition = "transform 0.3s ease";
    remDisplay.style.transform = "translate(0px, 0px)";
    return;
  }
  
  const exitX = dir > 0 ? 300 : -300;
  const enterX = dir > 0 ? -300 : 300;

  remDisplay.style.transition = "transform 0.2s ease, opacity 0.2s ease";
  remDisplay.style.transform = `translateX(${exitX}px)`;
  remDisplay.style.opacity = "0";

  setTimeout(() => {
    currentRemIndex = (currentRemIndex + dir + activeReminders.length) % activeReminders.length;
    updateReminderContent();

    remDisplay.style.transition = "none";
    remDisplay.style.transform = `translateX(${enterX}px)`;

    void remDisplay.offsetWidth;

    remDisplay.style.transition = "transform 0.3s ease, opacity 0.3s ease";
    remDisplay.style.transform = "translate(0px, 0px)";
    remDisplay.style.opacity = "1";
  }, 200);
}

function dismissCurrentReminder() {
  const rem = activeReminders[currentRemIndex];
  rem.isDismissed = true;
  saveReminders();
  
  remDisplay.style.transform = "scale(0.8) translateY(100px)";
  remDisplay.style.opacity = "0";
  
  setTimeout(() => {
    remDisplay.style.transform = "translate(0px, 0px)";
    remDisplay.style.opacity = "1";
    checkActiveReminders();
  }, 300);
}

setInterval(checkActiveReminders, 10000);
checkActiveReminders();

// ===== モーダル等その他の機能 =====
function openBirthdayModal() {
  const mSel = document.getElementById("bdMonth");
  mSel.innerHTML = "";
  for(let i=1; i<=12; i++) mSel.innerHTML += `<option value="${i}">${i}</option>`;
  updateBirthdayDays();
  
  if (userBirthday) {
    const [m, d] = userBirthday.split('-');
    document.getElementById("bdMonth").value = m;
    updateBirthdayDays();
    document.getElementById("bdDay").value = d;
  }

  document.getElementById("bdInputArea").style.display = "block";
  document.getElementById("bdConfirmArea").style.display = "none";
  
  const modal = document.getElementById("birthdayModal");
  document.getElementById("overlay").style.display = "block";
  modal.style.display = "block";
  setTimeout(() => {
    document.getElementById("overlay").classList.add("show");
    modal.classList.add("show");
  }, 10);
}

function updateBirthdayDays() {
  const m = parseInt(document.getElementById("bdMonth").value) || 1;
  const dSel = document.getElementById("bdDay");
  const daysInMonth = new Date(2024, m, 0).getDate(); 
  let currentDay = dSel.value;
  
  dSel.innerHTML = "";
  for(let i=1; i<=daysInMonth; i++) dSel.innerHTML += `<option value="${i}">${i}</option>`;
  if (currentDay && currentDay <= daysInMonth) dSel.value = currentDay;
}

function closeBirthdayModal() {
  const modal = document.getElementById("birthdayModal");
  modal.classList.remove("show");
  document.getElementById("overlay").classList.remove("show");
  setTimeout(() => {
    modal.style.display = "none";
    document.getElementById("overlay").style.display = "none";
  }, 200);
}

function confirmBirthday() {
  const m = document.getElementById("bdMonth").value;
  const d = document.getElementById("bdDay").value;
  document.getElementById("bdConfirmText").textContent = `${m}月${d}日`;
  document.getElementById("bdInputArea").style.display = "none";
  document.getElementById("bdConfirmArea").style.display = "block";
}

function cancelBirthday() {
  document.getElementById("bdConfirmArea").style.display = "none";
  document.getElementById("bdInputArea").style.display = "block";
}

function saveBirthday() {
  const m = document.getElementById("bdMonth").value;
  const d = document.getElementById("bdDay").value;
  const newBirthday = `${m}-${d}`;

  if (userBirthday && eventLines[userBirthday]) {
    eventLines[userBirthday] = eventLines[userBirthday].filter(line => line !== playerBirthdayLine);
    if (eventLines[userBirthday].length === 0) delete eventLines[userBirthday];
  }

  userBirthday = newBirthday;
  localStorage.setItem("userBirthday", userBirthday);

  if (!eventLines[userBirthday]) eventLines[userBirthday] = [];
  if (!eventLines[userBirthday].includes(playerBirthdayLine)) {
    eventLines[userBirthday].push(playerBirthdayLine);
  }

  closeBirthdayModal();
  document.getElementById("editBirthdayBtn").style.display = "inline-block";
  setTimeout(() => { showLine(`${m}月${d}日ね。覚えておくわ`, true); }, 300);
}

function handleDebugToggle(checkbox) {
  if (checkbox.checked) {
    checkbox.checked = false; 
    document.getElementById("overlay").style.display = "block";
    setTimeout(() => document.getElementById("overlay").classList.add("show"), 10);
    const modal = document.getElementById("passwordModal");
    modal.style.display = "block";
    setTimeout(() => modal.classList.add("show"), 10);
  } else {
    isDebugMode = false;
    debugSeen = [];
    document.getElementById("debugMenu").style.display = "none";
    alert("デバッグモードを終了しました。履歴は通常モードに戻ります。");
    initializeAchievements(seen);
  }
}

function closePasswordModal() {
  const modal = document.getElementById("passwordModal");
  modal.classList.remove("show");
  document.getElementById("overlay").classList.remove("show");
  setTimeout(() => {
    modal.style.display = "none";
    document.getElementById("overlay").style.display = "none";
  }, 200);
}

function checkPassword() {
  if (document.getElementById("debugPassword").value === debugPassword) {
    isDebugMode = true;
    debugSeen = []; 
    initializeAchievements(debugSeen);
    document.getElementById("debugToggle").checked = true;
    document.getElementById("debugPassword").value = "";
    document.getElementById("debugMenu").style.display = "flex";
    closePasswordModal();
    alert("デバッグモードを開始しました。");
  } else {
    alert("パスワードが違います。");
  }
}

function resetNormalHistory() {
  if (confirm("通常モードの履歴を完全に削除します。よろしいですか？")) {
    localStorage.removeItem("seen");
    seen = [];
    if (!isDebugMode) initializeAchievements(seen);
    alert("通常モードの履歴をリセットしました。");
  }
}

function saveSeen(text){
  const cleanText = text.replace("✨ ", "");
  if (isDebugMode) {
    if(!debugSeen.includes(cleanText)) debugSeen.push(cleanText);
  } else {
    if(!seen.includes(cleanText)){
      seen.push(cleanText);
      localStorage.setItem("seen", JSON.stringify(seen));
    }
  }
}

function toggleLog() {
  const log = document.getElementById("log");
  const overlay = document.getElementById("overlay");
  if (log.classList.contains("show")) {
    log.classList.remove("show");
    overlay.classList.remove("show");
    setTimeout(() => { log.style.display = "none"; overlay.style.display = "none"; }, 200);
  } else {
    renderLog();
    log.style.display = "block";
    overlay.style.display = "block";
    setTimeout(() => { log.classList.add("show"); overlay.classList.add("show"); }, 10);
  }
}

function renderLog() {
  const log = document.getElementById("logContent");
  log.innerHTML = "";
  const currentSeen = isDebugMode ? debugSeen : seen;
  const allRewards = [];
  for (let key in achievements) allRewards.push(achievements[key].reward);

  const eventLineValues = Object.values(eventLines).flat();
  const sections = [
    ["通常", normalLines],
    ["朝", timeLines.morning], ["昼1", timeLines.noon1], ["昼2", timeLines.noon2],
    ["夕方", timeLines.evening], ["夜", timeLines.night], ["深夜", timeLines.midnight],
    ["季節", eventLineValues],
    ["レア", [...rareLines.normal, ...rareLines.midnight]],
    ["アチーブメント", achievementLines]
  ];

  sections.forEach(([name, arr]) => {
    log.innerHTML += `<b>${name}</b><br>`;
    arr.forEach(text => {
      if (name !== "アチーブメント" && allRewards.includes(text)) return; 
      log.innerHTML += currentSeen.includes(text) ? text : "？？？";
      log.innerHTML += "<br>";
    });
    log.innerHTML += "<br>";
  });
}

function getZone(hour){
  if(hour>=5 && hour<9) return "morning";
  if(hour<12) return "noon1";
  if(hour<16) return "noon2";
  if(hour<18) return "evening";
  if(hour<21) return "night";
  return "midnight";
}

function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

function speak(){
  if (waitingForBirthdayClick) {
    waitingForBirthdayClick = false;
    openBirthdayModal();
    return;
  }
  if (pendingRewards.length > 0) {
    showLine(pendingRewards.shift(), true);
    return;
  }

  let line;
  let isRare = false;

  const pendingRems = allReminders.filter(r => !r.isDismissed);
  if (!isDebugMode && pendingRems.length > 0 && Math.random() < 0.15) {
    const randomRem = pick(pendingRems);
    line = `${randomRem.title}は大丈夫なの？`;
    showLine(line, false, true);
    return;
  }

  if (isDebugMode) {
    const condition = document.getElementById("debugCondition").value;
    let pool = [];
    switch (condition) {
      case "all":
        pool = [...normalLines, ...Object.values(timeLines).flat(), ...Object.values(eventLines).flat(), ...rareLines.normal, ...rareLines.midnight];
        line = pick(pool);
        isRare = rareLines.normal.includes(line) || rareLines.midnight.includes(line);
        break;
      case "morning": case "noon1": case "noon2": case "evening": case "night": case "midnight":
        pool = [...timeLines[condition]];
        line = pick(pool);
        break;
      case "seasonal":
        pool = [...Object.values(eventLines).flat()];
        if (achievements.seasonal.unlocked && !pool.includes(achievements.seasonal.reward)) pool.push(achievements.seasonal.reward);
        line = pick(pool);
        break;
      case "rare_normal":
        pool = [...rareLines.normal];
        if (achievements.rare.unlocked && !pool.includes(achievements.rare.reward)) pool.push(achievements.rare.reward);
        line = pick(pool);
        isRare = true;
        break;
      case "rare_midnight":
        pool = [...rareLines.midnight];
        line = pick(pool);
        isRare = true;
        break;
    }
    showLine(line, isRare);
    return;
  }

  const now = new Date();
  const hour = now.getHours();
  const zone = getZone(hour);
  const key = (now.getMonth()+1)+"-"+now.getDate();

  if(eventLines[key] && Math.random()<0.3){
    showLine(pick(eventLines[key]), false);
    return;
  }

  if(Math.random()<0.01){
    line = (zone==="midnight") ? pick(rareLines.midnight) : pick(rareLines.normal);
    showLine(line, true);
    return;
  }

  if(zone==="midnight"){
    line = pick(timeLines.midnight);
  } else {
    line = Math.random()<0.6 ? pick(timeLines[zone]) : pick(normalLines);
  }
  showLine(line, false);
}

function showLine(text, isRare, isDynamic = false){
  if (!isDynamic) saveSeen(text);
  const el = document.getElementById("speech");
  el.style.color = isRare ? "#2a6fff" : "black";
  
  // 新しく追加した表情変更関数を呼び出します
  document.getElementById("img").src = getFaceImage(text);
  
  typeText(text, isDynamic);
}

function typeText(text, isDynamic = false) {
  if (typing) return;
  typing = true;
  const el = document.getElementById("speech");
  el.textContent = "";

  let i = 0;
  function step() {
    if (i < text.length) {
      el.textContent += text[i];
      i++;
      setTimeout(step, 25);
    } else {
      typing = false;
      if (text.includes(achievements.seasonal.reward)) {
        waitingForBirthdayClick = true;
        document.getElementById("editBirthdayBtn").style.display = "inline-block";
      }
      if (!isDynamic) checkAchievements();
    }
  }
  step();
}

function checkAchievements() {
  const currentSeen = isDebugMode ? debugSeen : seen;

  for (let key in achievements) {
    const ach = achievements[key];
    if (ach.unlocked || key === "all") continue;

    const allSeen = ach.lines.every(line => currentSeen.includes(line));
    if (allSeen) {
      ach.unlocked = true;
      pendingRewards.push("✨ " + ach.reward);
      if (!achievementLines.includes(ach.reward)) achievementLines.push(ach.reward);
      addRewardToPool(key, ach.reward);
      if (key === "seasonal") document.getElementById("editBirthdayBtn").style.display = "inline-block";
    }
  }

  if (!achievements.all.unlocked) {
    const allLines = achievements.all.lines;
    const allSeen = allLines.every(line => currentSeen.includes(line));
    if (allSeen && allLines.length > 0) {
      achievements.all.unlocked = true;
      pendingRewards.push("✨ " + achievements.all.reward);
      if (!achievementLines.includes(achievements.all.reward)) achievementLines.push(achievements.all.reward);
      addRewardToPool("all", achievements.all.reward);
    }
  }
}

document.getElementById("overlay").onclick = function(e) {
  if (e.target.id === "overlay") {
    if (document.getElementById("passwordModal").classList.contains("show")) {
      closePasswordModal();
    } else if (document.getElementById("birthdayModal").classList.contains("show")) {
      closeBirthdayModal();
    } else if (document.getElementById("reminderCreateModal").classList.contains("show")) {
      closeReminderCreateModal();
    } else {
      toggleLog();
    }
  }
};
